name: razorpay_auth_capture
version: 1.0.0
description: A Flutter package for Razorpay Authorization & Capture payment flow. Supports Promise Fee pattern with automatic hold and release.
homepage: https://github.com/yourusername/razorpay-auth-capture
repository: https://github.com/yourusername/razorpay-auth-capture
issue_tracker: https://github.com/yourusername/razorpay-auth-capture/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cloud_functions: ">=6.0.0 <7.0.0"
  cloud_firestore: ^6.1.1
  firebase_core: ^4.4.0
  razorpay_flutter: ^1.3.0
  flutter_dotenv: ^5.1.0
  uuid: ^4.2.1
  js: ^0.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

false_secrets:
  - example/**/firebase_options.dart
  - example/**/.env

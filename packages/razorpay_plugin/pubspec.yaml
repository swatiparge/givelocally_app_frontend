name: razorpay_auth_capture
version: 1.0.0
description: >
  Flutter plugin for Razorpay Authorization & Capture payment flow.
  Handles client-side Razorpay checkout and returns payment identifiers
  for secure backend processing.

homepage: https://github.com/yourusername/razorpay-auth-capture
repository: https://github.com/yourusername/razorpay-auth-capture
issue_tracker: https://github.com/yourusername/razorpay-auth-capture/issues

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  razorpay_flutter: ^1.3.0
  # 🔥 REQUIRED — because package imports them
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.1.0
  cloud_functions: ^6.0.0
  uuid: ^4.2.1

  # Web support only if you actually use it
  js: ^0.6.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
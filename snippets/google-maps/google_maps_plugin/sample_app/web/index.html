<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Google Maps Plugin Demo - Reusable maps for Flutter">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Google Maps Plugin Demo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Google Maps Plugin Demo</title>
  <link rel="manifest" href="manifest.json">

  <!-- 
    GOOGLE MAPS API KEY - REQUIRED FOR WEB
    
    IMPORTANT: For Flutter Web, you MUST load the Google Maps JavaScript API 
    in this HTML file before the Flutter app starts. The .env file approach 
    does NOT work for web because the maps library needs to be loaded before
    the widget tree is built.
    
    Steps:
    1. Replace YOUR_API_KEY_HERE with your actual Google Maps API key
    2. Get your key at: https://console.cloud.google.com/
    3. Make sure "Maps JavaScript API" is enabled in your Google Cloud project
    
    Note: Android and iOS use different configuration files (see README.md)
  -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDo1Ff1v46Nivfj0KKbLdW4cCSgi-0cVBw"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

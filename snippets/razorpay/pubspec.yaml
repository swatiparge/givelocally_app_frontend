name: givelocally
description: GiveLocally - Hyperlocal donation platform with Razorpay Promise Fee
generate: true
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase - Using compatible versions
  firebase_core: ^2.24.2
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  cloud_functions: ^4.5.0
  
  # Razorpay Plugin (Local)
  razorpay_auth_capture:
    path: ./razorpay_plugin/flutter_package
  
  # Environment
  flutter_dotenv: ^5.1.0
  
  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0



flutter:
  uses-material-design: true
  
  assets:
    - .env
    - .env.example

  # Enable generation of localized strings
  generate: true
